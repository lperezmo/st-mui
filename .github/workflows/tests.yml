name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TypeScript type check of the frontend. Runs independently of the build
  # (Vite transpiles without type-checking), so this is the only gate that
  # catches type regressions such as passing a prop MUI does not accept.
  typecheck:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: st_mui/frontend/package-lock.json
      - run: npm ci
        working-directory: st_mui/frontend
      - run: npm run typecheck
        working-directory: st_mui/frontend

  # Build the frontend once and share the built assets with every test leg.
  # build/ is gitignored, so without this the package can't register components.
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: st_mui/frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: st_mui/frontend
      - name: Assert production build
        run: bash scripts/assert_prod_build.sh
      - run: tar czf frontend-build.tgz st_mui/*/frontend/build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend-build.tgz
          retention-days: 1

  # Fast, browser-less guard across every supported Streamlit minor: discovery
  # registers all six components, `import st_mui` stays lazy, and the compat
  # layer can disable style isolation (at registration on >=1.53, call site on
  # 1.51/1.52).
  smoke:
    name: Smoke (Streamlit ${{ matrix.streamlit || 'latest' }})
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        streamlit: ['1.51.*', '1.52.*', '1.53.*', '1.56.*', '']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: frontend-build
      - run: tar xzf frontend-build.tgz
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install package and selected Streamlit
        run: |
          uv venv
          if [ -n "${{ matrix.streamlit }}" ]; then
            uv pip install -e . pytest "streamlit==${{ matrix.streamlit }}"
          else
            uv pip install -e . pytest
          fi
      - run: .venv/bin/python -c "import streamlit; print('streamlit', streamlit.__version__)"
      - run: .venv/bin/python -m pytest test/test_registration_smoke.py -v
